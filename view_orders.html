<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View Orders</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .order-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #000; }
        .order-card h3 { margin: 0 0 10px 0; color: #27ae60; }
        .order-card p { margin: 5px 0; font-size: 14px; }
        .time { color: #888; font-size: 12px; }
        .phone { color: #25D366; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Incoming Orders</h1>
    <div id="ordersList">Loading orders...</div>

    <script>
        const cfg = {
            apiKey: "AIzaSyCsk2F8LAFD1vstABolOCuHIoGqr5P3ZRE",
            authDomain: "mh-collection-75017.firebaseapp.com",
            projectId: "mh-collection-75017",
            storageBucket: "mh-collection-75017.firebasestorage.app",
            messagingSenderId: "586581414643",
            appId: "1:586581414643:web:91aaf351193aacd433dd86"
        };

        firebase.initializeApp(cfg);
        const db = firebase.firestore();

        db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";

            if (snapshot.empty) {
                list.innerHTML = "<p style='text-align:center;'>Abhi koi order nahi aaya.</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const o = doc.data();
                const date = o.timestamp ? new Date(o.timestamp.seconds * 1000).toLocaleString() : "Just now";
                
                list.innerHTML += `
                    <div class="order-card">
                        <h3>Item: ${o.product}</h3>
                        <p><strong>Customer:</strong> ${o.customerName}</p>
                        <p><strong>Phone:</strong> <a class="phone" href="https://wa.me/${o.customerPhone}">+${o.customerPhone}</a></p>
                        <p><strong>Address:</strong> ${o.address}</p>
                        <p class="time">Ordered at: ${date}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
