<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH Collection | Premium Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="luxury-header">
        <p class="premium-tag">PREMIUM SELECTION</p>
        <h1 id="logo-text">MH COLLECTION</h1>
        <p class="slogan">ELEGANCE IN EVERY STEP</p>
    </div>

    <div class="category-bar">
        <button onclick="filterCat('all')" class="cat-btn active">All</button>
        <button onclick="filterCat('Gents')" class="cat-btn">Gents</button>
        <button onclick="filterCat('Ladies')" class="cat-btn">Ladies</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Search items (e.g. Shoes)...">
    </div>

    <div class="container">
        <div id="productList" class="product-grid">
            <p class="loading-text">Loading Items...</p>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModals()">&times;</span>
            <h3>Add New Product</h3>
            <input type="text" id="prodName" placeholder="Product Name">
            <input type="number" id="prodPrice" placeholder="Price">
            <select id="prodCat">
                <option value="Gents">Gents</option>
                <option value="Ladies">Ladies</option>
            </select>
            <input type="file" id="fileInput" accept="image/*">
            <button class="upload-btn" onclick="uploadProduct()" id="uploadBtn">Upload</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content profile-card">
            <span class="close" onclick="closeModals()">&times;</span>
            <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
            <h2 id="userNameDisplay">Customer Name</h2>
            <p><i class="fas fa-map-marker-alt"></i> Address: Street 5, Liaquatpur</p>
            <p><i class="fas fa-phone"></i> +92 300 1234567</p>
            <button class="edit-profile-btn">Edit Profile</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="javascript:void(0)" onclick="location.reload()" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="javascript:void(0)" onclick="filterCat('Ladies')" class="nav-link"><i class="fas fa-venus"></i><span>Ladies</span></a>
        <a href="javascript:void(0)" onclick="document.getElementById('searchInput').focus()" class="nav-link"><i class="fas fa-search"></i><span>Search</span></a>
        <a href="javascript:void(0)" onclick="alert('No active orders yet')" class="nav-link"><i class="fas fa-shopping-bag"></i><span>Orders</span></a>
        <a href="javascript:void(0)" onclick="showModal('profile-modal')" class="nav-link"><i class="fas fa-user"></i><span>Profile</span></a>
        <a href="javascript:void(0)" onclick="showModal('admin-modal')" class="nav-link admin-only"><i class="fas fa-lock"></i><span>Admin</span></a>
    </div>

    <script src="script.js"></script>
</body>
</html>
