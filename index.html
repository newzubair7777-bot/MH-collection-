<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH COLLECTION</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; text-align: center; }
        header { background: #000; color: #fff; padding: 20px; font-size: 24px; font-weight: bold; text-transform: uppercase; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }
        .btn { background: #000; color: #fff; padding: 10px; border: none; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; text-align: left; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .close-btn { float: right; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>MH COLLECTION</header>

<div class="container" id="grid"></div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2>Your Order</h2>
        <p id="selectedItemName" style="font-weight: bold; color: #555;"></p>
        <input type="text" id="custName" placeholder="Your Name" required>
        <input type="number" id="custPhone" placeholder="WhatsApp Number" required>
        <textarea id="custAddress" placeholder="Full Delivery Address" rows="3" required></textarea>
        <button class="btn" onclick="placeOrder()">Confirm Order</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCsk2F8LAFD1vstABoIOcuHiGqr5P3ZRE",
        authDomain: "mh-collection-75017.firebaseapp.com",
        projectId: "mh-collection-75017",
        storageBucket: "mh-collection-75017.firebasestorage.app",
        messagingSenderId: "586581414643",
        appId: "1:586581414643:web:91aaf351193aacd433dd86"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentProduct = "";

    // Load Products
    db.collection("products").onSnapshot((snapshot) => {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        snapshot.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `
            <div class="card">
                <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image+Available'">
                <h3>${p.name}</h3>
                <span class="price">RS ${p.price}</span>
                <button class="btn" onclick="openModal('${p.name}')">Order Now</button>
            </div>
            `;
        });
    });

    function openModal(name) {
        currentProduct = name;
        document.getElementById('selectedItemName').innerText = "Product: " + name;
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function placeOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const address = document.getElementById('custAddress').value;

        if (!name || !phone || !address) {
            alert("Please fill all details!");
            return;
        }

        db.collection("orders").add({
            item: currentProduct,
            name: name,
            phone: phone,
            address: address,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            alert("Order Placed Successfully!");
            closeModal();
        });
    }
</script>

</body>
</html>
