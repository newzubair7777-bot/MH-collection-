<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH Collection | Luxury Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="luxury-header">
        <p class="premium-tag">PREMIUM SELECTION</p>
        <h1 id="main-logo">MH COLLECTION</h1>
        <p class="slogan">ELEGANCE IN EVERY STEP</p>
    </div>

    <div class="promo-banner">✨ HURRY UP! GET DISCOUNTED PRICES ✨</div>

    <div id="admin-panel" class="container admin-box">
        <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
        <div class="admin-form">
            <input type="text" id="prodName" placeholder="Product Name (e.g. Luxury Shirt)">
            <input type="number" id="prodPrice" placeholder="Price (Rs.)">
            
            <label class="file-label">
                <input type="file" id="fileInput" accept="image/*">
                <i class="fas fa-image"></i> Select Photo
            </label>

            <div id="crop-container" style="display:none;">
                <img id="image-to-crop" style="max-width: 100%;">
                <button type="button" class="crop-btn" onclick="applyCrop()">Crop & Save</button>
            </div>

            <button class="upload-btn" onclick="uploadProduct()" id="uploadBtn">Upload Product</button>
        </div>
    </div>

    <div class="container">
        <h2 class="title">🔥 HOT SELLINGS 🔥</h2>
        <div id="productList" class="product-grid">
            <p class="loading-text">Loading Collection...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-link active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" class="nav-link"><i class="fas fa-th-large"></i><span>Category</span></a>
        <a href="#" class="nav-link"><i class="fas fa-search"></i><span>Search</span></a>
        <a href="#" class="nav-link"><i class="fas fa-shopping-bag"></i><span>Orders</span></a>
        <a href="javascript:void(0)" onclick="toggleAdmin()" class="nav-link"><i class="fas fa-user-shield"></i><span>Admin</span></a>
    </div>

    <script src="script.js"></script>
</body>
</html>
